version: "3.9"

services:

  # ── Base de données PostGIS ──────────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    container_name: mobility_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-mobility}
      POSTGRES_USER:     ${POSTGRES_USER:-mobility_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mobility_user} -d ${POSTGRES_DB:-mobility}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Collecteur de données ────────────────────────────────────────────────────
  collector:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: mobility_collector
    restart: unless-stopped
    command: python -m src.collector.main
    env_file: .env
    environment:
      POSTGRES_HOST: db        # remplace "localhost" du .env
    volumes:
      - ./data/gtfs_static:/app/data/gtfs_static:ro
      - ./src:/app/src:ro
    depends_on:
      db:
        condition: service_healthy

  # ── API FastAPI ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: mobility_api
    restart: unless-stopped
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      POSTGRES_HOST: db        # remplace "localhost" du .env
    ports:
      - "8000:8000"
    volumes:
      - ./data/features:/app/data/features:ro   # model.pkl + model_artifacts.json
      - ./frontend:/app/frontend:ro             # carte Leaflet
      - ./src:/app/src:ro                       # code source (restart suffit, pas de rebuild)
    depends_on:
      db:
        condition: service_healthy

  # ── MLflow UI ─────────────────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1
    container_name: mobility_mlflow
    command: mlflow server --host 0.0.0.0 --port 5000
    ports:
      - "5001:5000"
    volumes:
      - mlruns:/mlruns

volumes:
  pgdata:
  mlruns:
